<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷失森林：无尽探险 - 文本RPG</title>
    <style>
        /* 深度暗黑魔幻风格 */
        body {
            background-color: #0d0f0d;
            color: #d0d7d0;
            font-family: 'Consolas', 'Fira Code', 'Segoe UI', "Microsoft YaHei", monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        .game-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 20px;
            width: 95%;
            max-width: 900px;
            height: 90vh;
        }
        /* 侧边栏：角色状态面板 */
        .sidebar {
            background-color: #131713;
            border: 1px solid #273327;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .panel-title {
            color: #4caf50;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 2px solid #273327;
            padding-bottom: 8px;
            text-align: center;
            letter-spacing: 1px;
        }
        .stat-row {
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .stat-label {
            color: #889988;
        }
        .bar-container {
            height: 12px;
            background-color: #222;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .bar-fill-hp {
            height: 100%;
            background-color: #e57373;
            width: 100%;
            transition: width 0.3s ease;
        }
        .bar-fill-xp {
            height: 100%;
            background-color: #4fc3f7;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        /* 右侧：主游戏视窗 */
        .main-window {
            background-color: #131713;
            border: 1px solid #273327;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        #game-screen {
            flex-grow: 1;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 15px;
            overflow-y: auto;
            white-space: pre-line;
            padding-right: 5px;
        }
        /* 交互按钮区域 */
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            background-color: #1e241e;
            color: #c8ecc8;
            border: 1px solid #486348;
            padding: 12px 18px;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: left;
        }
        button:hover {
            background-color: #4caf50;
            color: #0c0f0c;
            font-weight: bold;
            border-color: #81c784;
            transform: scale(1.01);
        }
        button:active {
            transform: scale(1);
        }
        /* 命令行风格日志窗口 */
        .console-log {
            height: 120px;
            background-color: #080a08;
            border: 1px solid #222;
            border-radius: 6px;
            padding: 10px;
            font-size: 12px;
            overflow-y: auto;
            color: #a0baa0;
        }

        /* ================= 📱 移动端响应式适配 (CSS Media Query) ================= */
        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                padding: 10px 0;
                overflow-y: auto; /* 允许手机整页上下滚动 */
            }
            .game-layout {
                grid-template-columns: 1fr; /* 单列布局 */
                height: auto;
                width: 95%;
                gap: 15px;
            }
            /* 重构属性栏：改为紧凑的两列网格布局，省出高度空间给主视窗 */
            .sidebar {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px 15px;
                padding: 12px 15px;
            }
            .panel-title {
                grid-column: span 2;
                margin-bottom: 0;
                font-size: 15px;
                padding-bottom: 4px;
            }
            .stat-row {
                font-size: 12px;
                gap: 2px;
            }
            /* 让背包在手机端独占一行，显示更多文字 */
            .sidebar .stat-row:last-child {
                grid-column: span 2;
            }
            #bag-list {
                margin-top: 2px;
                padding: 6px;
                min-height: auto;
            }
            
            .main-window {
                padding: 15px;
                height: auto;
                min-height: 480px; /* 确保操作区域有足够的高度 */
            }
            #game-screen {
                font-size: 14px;
                min-height: 180px;
            }
            button {
                padding: 10px 14px;
                font-size: 14px;
            }
            .console-log {
                height: 90px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="game-layout">
        <!-- 侧边栏面板 -->
        <div class="sidebar">
            <div class="panel-title">🛡️ 角色面板</div>
            <div class="stat-row">
                <span class="stat-label">✨ 等级 & 经验: <span id="lv-val" style="color:#4fc3f7">LV.1</span></span>
                <div class="bar-container">
                    <div class="bar-fill-xp" id="xp-fill"></div>
                </div>
                <span style="font-size:11px; text-align:right" id="xp-text">0/100</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">❤️ 生命值: <span id="hp-text" style="color:#e57373">80/80</span></span>
                <div class="bar-container">
                    <div class="bar-fill-hp" id="hp-fill"></div>
                </div>
            </div>
            <div class="stat-row">
                <span class="stat-label">⚔️ 攻击力: <span id="atk-val" style="color:#ffd54f">10</span></span>
            </div>
            <div class="stat-row">
                <span class="stat-label">🛡️ 防御力: <span id="def-val" style="color:#81c784">2</span></span>
            </div>
            <div class="stat-row">
                <span class="stat-label">🪙 持有金币: <span id="gold-val" style="color:#ffd54f">30</span></span>
            </div>
            <div class="stat-row" style="flex-grow:1; display:flex; flex-direction:column">
                <span class="stat-label">🎒 背包物品:</span>
                <div id="bag-list" style="margin-top:5px; font-size:12px; color:#a0b0a0; line-height:1.6; border: 1px dashed #273327; padding:8px; flex-grow:1; border-radius:5px">无</div>
            </div>
        </div>

        <!-- 主游戏视窗 -->
        <div class="main-window">
            <div id="game-screen">点击下方按钮开始你的无尽森林冒险...</div>
            <div class="choices-container" id="choices">
                <button onclick="startGame()" style="text-align: center;">🎬 开始冒险</button>
            </div>
            <!-- 控制台冒险日志 -->
            <div class="console-log" id="console-log"></div>
        </div>
    </div>

    <script>
        // 浏览器内置 Web Audio 合成音效
        let audioCtx = null;
        function playSound(type) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                if (type === 'click') {
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'hit') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(140, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                } else if (type === 'heal') {
                    osc.frequency.setValueAtTime(250, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.25);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.25);
                } else if (type === 'level') {
                    // 升级和弦音
                    let now = audioCtx.currentTime;
                    osc.frequency.setValueAtTime(261.63, now); // C4
                    osc.frequency.setValueAtTime(329.63, now + 0.1); // E4
                    osc.frequency.setValueAtTime(392.00, now + 0.2); // G4
                    osc.frequency.setValueAtTime(523.25, now + 0.3); // C5
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(); osc.stop(now + 0.5);
                }
            } catch(e) {}
        }

        // 冒险日志打印
        function log(msg, color = '#a0baa0') {
            const consoleBox = document.getElementById('console-log');
            if (consoleBox) {
                const item = document.createElement('div');
                item.style.color = color;
                item.style.marginBottom = '4px';
                item.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
                consoleBox.appendChild(item);
                consoleBox.scrollTop = consoleBox.scrollHeight;
            }
        }

        // 核心游戏角色状态
        let player = {
            level: 1,
            xp: 0,
            xpNeeded: 100,
            hp: 80,
            maxHp: 80,
            gold: 30,
            baseAtk: 10,
            atkBonus: 0,
            baseDef: 2,
            defBonus: 0,
            inventory: [],
            hasRested: false,
            puzzleSolved: false
        };

        // 战斗临时状态
        let combat = {
            active: false,
            enemyName: "",
            enemyHp: 0,
            enemyMaxHp: 0,
            enemyAtk: 0,
            rewardXp: 0,
            rewardGold: 0,
            onWin: null
        };

        function getAtk() { return player.baseAtk + player.atkBonus; }
        function getDef() { return player.baseDef + player.defBonus; }

        function updateUI() {
            const currentHp = Math.max(0, player.hp);
            document.getElementById('hp-text').innerText = `${currentHp}/${player.maxHp}`;
            document.getElementById('hp-fill').style.width = `${(currentHp / player.maxHp) * 100}%`;
            
            document.getElementById('xp-text').innerText = `${player.xp}/${player.xpNeeded}`;
            document.getElementById('xp-fill').style.width = `${(player.xp / player.xpNeeded) * 100}%`;
            
            document.getElementById('lv-val').innerText = `LV.${player.level}`;
            document.getElementById('atk-val').innerText = getAtk();
            document.getElementById('def-val').innerText = getDef();
            document.getElementById('gold-val').innerText = player.gold;
            document.getElementById('bag-list').innerHTML = player.inventory.length > 0 ? player.inventory.join('<br>') : '空无一物';
        }

        // 获得经验与升级机制
        function gainXp(amount) {
            player.xp += amount;
            log(`获得 ${amount} 点经验值。`, '#4fc3f7');
            if (player.xp >= player.xpNeeded) {
                player.xp -= player.xpNeeded;
                player.level++;
                player.maxHp += 20;
                player.hp = player.maxHp;
                player.baseAtk += 4;
                player.xpNeeded = Math.floor(player.xpNeeded * 1.5);
                playSound('level');
                log(`🎉 恭喜！你升到了 LV.${player.level}！生命值全满，战斗属性提升！`, '#81c784');
            }
            updateUI();
        }

        function damagePlayer(amount, source) {
            player.hp -= amount;
            playSound('hit');
            log(`受到来自【${source}】的 ${amount} 点伤害！`, '#e57373');
            if (player.hp <= 0) {
                log(`💀 你在森林深处力竭倒下...`, '#ff5252');
                gameOver();
            }
            updateUI();
        }

        // 启动游戏入口
        function startGame() {
            playSound('click');
            log("你踏入了迷雾森林保护区。冒险正式开始！", '#81c784');
            showCamp();
        }

        // --- 安全营地主界面 ---
        function showCamp() {
            updateUI();
            const text = `🏕️ 【森林安全营地】
            这里是唯一的避风港，篝火噼啪作响。在这里你可以整理行装、与商人交易，或者动身探索不同的森林区域。
            
            当前位置：营地大门`;
            
            const choices = [
                { text: "🌲 前往【毒雾沼泽】 (适合 LV.1 - LV.2 练级)", action: () => { playSound('click'); showSwamp(); } },
                { text: "🏛️ 前往【古老石碑遗迹】 (适合 LV.2 - LV.3 寻宝)", action: () => { playSound('click'); showRuins(); } },
                { text: "👹 踏入【深渊神庙核心】 (⚠️ 最终 BOSS 巢穴，极其危险！)", action: () => { playSound('click'); showAbyss(); } },
                { text: "🛒 拜访【流浪商人】 (购买/出售装备)", action: () => { playSound('click'); showMerchant(); } },
                { text: "🪵 在篝火旁休息 (花费5金币，恢复 40 生命值)", action: () => { restAtCamp(); } }
            ];
            render(text, choices);
        }

        function restAtCamp() {
            if (player.gold >= 5) {
                player.gold -= 5;
                player.hp = Math.min(player.maxHp, player.hp + 40);
                playSound('heal');
                log("你在篝火旁烤着火，感觉体力恢复了不少（HP+40，消耗金币-5）", '#81c784');
                showCamp();
            } else {
                log("流浪商人阻止了你：“篝火柴火也是要成本的，你金币不够了。”", '#ffd54f');
            }
        }

        // --- 场景：毒雾沼泽 (刷怪刷钱点) ---
        function showSwamp() {
            const text = `🌲 【毒雾沼泽】
            四周弥漫着粘稠的绿雾，泥潭中泛着气泡，四周不时传来低劣怪物的异动。
            在沼泽中探索可能寻找到草药，但也随时可能遭遇怪物。`;
            const choices = [
                { text: "⚔️ 在沼泽中搜寻怪物 (进行刷怪练级)", action: () => { patrolSwamp(); } },
                { text: "🌿 寻找散落的沼泽草药", action: () => { searchSwampHerbs(); } },
                { text: "🚶 返回安全营地", action: () => { playSound('click'); showCamp(); } }
            ];
            render(text, choices);
        }

        function patrolSwamp() {
            playSound('click');
            const rand = Math.random();
            if (rand < 0.5) {
                startBattle("沼泽粘液史莱姆", 35, 6, 25, 10, () => { showSwamp(); });
            } else {
                startBattle("剧毒哥布林盗贼", 45, 9, 40, 18, () => { showSwamp(); });
            }
        }

        function searchSwampHerbs() {
            playSound('click');
            const rand = Math.random();
            if (rand < 0.4) {
                player.hp = Math.min(player.maxHp, player.hp + 20);
                playSound('heal');
                log("你找到了一株‘夜光蓝草’，服用后感到神清气爽（HP+20）", '#81c784');
            } else if (rand < 0.7) {
                player.gold += 12;
                log("你在一处冒险者的遗物中找到了散落的 12 枚金币！", '#ffd54f');
            } else {
                log("你在沼泽里踩空滑入泥潭，还不小心惊动了潜伏的怪物！", '#e57373');
                damagePlayer(10, "泥潭陷阱");
                if (player.hp > 0) {
                    startBattle("泥潭巨鳄", 55, 11, 50, 25, () => { showSwamp(); });
                }
                return;
            }
            showSwamp();
        }

        // --- 场景：古老遗迹 (探索、解密点) ---
        function showRuins() {
            const text = `🏛️ 【古老石碑遗迹】
            斑驳的石门半掩，残垣断壁上刻着早已风化的古老祭文。
            废墟深处的密室可能藏有开启神庙侧室的钥匙，但也游荡着不死的骸骨守卫。`;
            const choices = [
                { text: "⚔️ 探索石壁回廊 (挑战骸骨守卫)", action: () => { patrolRuins(); } },
                { text: "🧩 解开中央遗迹石壁的谜题", action: () => { solvePuzzle(); } },
                { text: "🚶 返回安全营地", action: () => { playSound('click'); showCamp(); } }
            ];
            render(text, choices);
        }

        function patrolRuins() {
            playSound('click');
            startBattle("不死骸骨弓箭手", 60, 13, 60, 30, () => {
                const rand = Math.random();
                if (rand < 0.4 && !player.inventory.includes("神秘钥匙")) {
                    player.inventory.push("神秘钥匙");
                    log("🎁 战斗胜利后，你在骸骨灰烬中拾起了一把闪着铜绿色的【神秘钥匙】！", '#64b5f6');
                }
                showRuins();
            });
        }

        function solvePuzzle() {
            playSound('click');
            if (player.puzzleSolved) {
                const text = `🏛️ 【遗迹大厅 - 谜题已解开】\n你已经破解了这里的智慧试炼，石壁上亮着淡紫色的光辉。`;
                const choices = [{ text: "返回遗迹入口", action: () => { showRuins(); } }];
                render(text, choices);
                return;
            }

            const text = `🧩 【智慧圣殿】
            石碑前刻着一道斯芬克斯式的谜题：
            “生来四条腿，中午两条腿，迟暮三条腿。此为何物？”`;
            const choices = [
                { text: "🅰️ 答案：人", action: () => {
                    playSound('heal');
                    player.puzzleSolved = true;
                    player.baseAtk += 4;
                    log("💡 解密成功！石壁震动吐出淡紫色灵力，你的基础攻击力永久提升 4 点！", '#81c784');
                    showRuins();
                }},
                { text: "🅱️ 答案：神", action: () => {
                    log("❌ 答错了！石碑释放出雷电电击了你！", '#e57373');
                    damagePlayer(15, "机关雷击");
                    if (player.hp > 0) showRuins();
                }},
                { text: "🚶 放弃解密，离开", action: () => { showRuins(); } }
            ];
            render(text, choices);
        }

        // --- 场景：流浪商店 ---
        function showMerchant() {
            const text = `🛒 【流浪商店】
            “欢迎欢迎！买点什么防身吗？有了好家伙，打那些骨头渣子就跟玩一样！”
            你现在拥有 ${player.gold} 枚金币。`;
            const choices = [];

            if (!player.inventory.includes("钢制大剑")) {
                choices.push({ text: "⚔️ 购买【钢制大剑】 (提升12点攻击力) - 价格：35金币", action: () => { buyItem("钢制大剑", 35, 'atk', 12); } });
            }
            if (!player.inventory.includes("精铁重盾")) {
                choices.push({ text: "🛡️ 购买【精铁重盾】 (提升6点防御力) - 价格：30金币", action: () => { buyItem("精铁重盾", 30, 'def', 6); } });
            }
            choices.push({ text: "🧪 购买【疗伤药水】 (购买后立即可用作战斗恢复) - 价格：15金币", action: () => { buyPotion(); } });
            choices.push({ text: "🚶 离开商店", action: () => { playSound('click'); showCamp(); } });

            render(text, choices);
        }

        function buyItem(name, cost, type, value) {
            playSound('click');
            if (player.gold >= cost) {
                player.gold -= cost;
                player.inventory.push(name);
                if (type === 'atk') player.atkBonus += value;
                if (type === 'def') player.defBonus += value;
                log(`💸 成功购买并装备了【${name}】！属性得到提升！`, '#ffd54f');
            } else {
                log("流浪商人白了你一眼：“金币不够，概不赊账！”", '#ffd54f');
            }
            showMerchant();
        }

        function buyPotion() {
            playSound('click');
            if (player.gold >= 15) {
                player.gold -= 15;
                player.inventory.push("疗伤药水");
                log("💸 购买了【疗伤药水】，已收入行囊中！", '#ffd54f');
            } else {
                log("流浪商人冷笑一声：“连买药钱都没有，你还是别去神庙送死了。”", '#ffd54f');
            }
            showMerchant();
        }

        // --- 核心：回合制战斗系统逻辑 ---
        function startBattle(name, hp, atk, rewardXp, rewardGold, onWinCallback) {
            combat.active = true;
            combat.enemyName = name;
            combat.enemyHp = hp;
            combat.enemyMaxHp = hp;
            combat.enemyAtk = atk;
            combat.rewardXp = rewardXp;
            combat.rewardGold = rewardGold;
            combat.onWin = onWinCallback;
            log(`⚔️ 战斗触发！你遭遇了【${name}】！`, '#ff5252');
            runCombatTurn(true); // 渲染首回合
        }

        function runCombatTurn(initial = false, playerAction = null) {
            updateUI();
            
            if (player.hp <= 0) return; // 玩家已死跳出

            let logMsg = "";
            
            if (!initial && playerAction) {
                // 1. 玩家回合阶段
                if (playerAction === 'attack') {
                    // 随机浮动伤害 85% ~ 115%
                    let dmg = Math.floor(getAtk() * (0.85 + Math.random() * 0.3));
                    let isCrit = Math.random() < 0.15; // 15% 暴击率
                    if (isCrit) {
                        dmg = Math.floor(dmg * 1.5);
                        logMsg += `💥 【致命一击！】你对【${combat.enemyName}】造成了 ${dmg} 点暴击物理伤害！\n`;
                    } else {
                        logMsg += `⚔️ 你挥动武器，对【${combat.enemyName}】造成了 ${dmg} 点伤害。\n`;
                    }
                    combat.enemyHp -= dmg;
                    playSound('hit');
                } else if (playerAction === 'block') {
                    combat.isBlocking = true;
                    logMsg += `🛡️ 你沉下重心进行“战术防御”，准备化解怪物的下次猛袭并展开格挡反击。\n`;
                } else if (playerAction === 'potion') {
                    // 消耗药水
                    const idx = player.inventory.indexOf("疗伤药水");
                    player.inventory.splice(idx, 1);
                    player.hp = Math.min(player.maxHp, player.hp + 50);
                    playSound('heal');
                    logMsg += `🧪 你拧开瓶塞一饮而尽，生命值奇迹地回复了 50 点！\n`;
                }

                // 检查怪物是否战死
                if (combat.enemyHp <= 0) {
                    playSound('level');
                    log(`🏆 你击败了【${combat.enemyName}】！`, '#81c784');
                    player.gold += combat.rewardGold;
                    log(`在怪物的尸骸里你搜括到了 ${combat.rewardGold} 枚金币。`, '#ffd54f');
                    gainXp(combat.rewardXp);
                    combat.active = false;
                    combat.onWin();
                    return;
                }

                // 2. 怪物回合阶段
                let enemyDmg = Math.floor(combat.enemyAtk * (0.8 + Math.random() * 0.4));
                if (combat.isBlocking) {
                    // 战术格挡：伤害减半，且怪物受到固定8点反伤
                    let reducedDmg = Math.max(1, Math.floor((enemyDmg - getDef()) / 2));
                    logMsg += `🛡️ 格挡成功！你仅受到了 ${reducedDmg} 点伤。防守反击对怪物造成 8 点反伤！\n`;
                    player.hp -= reducedDmg;
                    combat.enemyHp -= 8;
                    combat.isBlocking = false;
                    playSound('hit');
                    
                    if (combat.enemyHp <= 0) {
                        log(`🏆 你通过防守反击反震死了【${combat.enemyName}】！`, '#81c784');
                        player.gold += combat.rewardGold;
                        gainXp(combat.rewardXp);
                        combat.active = false;
                        combat.onWin();
                        return;
                    }
                } else {
                    let actualDmg = Math.max(1, enemyDmg - getDef());
                    logMsg += `👾 【${combat.enemyName}】发起攻击，对你造成 ${actualDmg} 点伤害。\n`;
                    player.hp -= actualDmg;
                    playSound('hit');
                }

                // 再次检查玩家是否死亡
                if (player.hp <= 0) {
                    log(`💀 你在和【${combat.enemyName}】的惨烈搏杀中撑不住，倒地而亡。`, '#ff5252');
                    gameOver();
                    return;
                }
            }

            // 渲染战斗画面
            let enemyHpColor = combat.enemyHp < combat.enemyMaxHp * 0.3 ? '#ff5252' : '#81c784';
            const screenText = `⚔️ 【遭遇突击战】
            敌方目标：<span style="color:#e57373">${combat.enemyName}</span>
            敌方生命：<span style="color:${enemyHpColor}">${Math.max(0, combat.enemyHp)} / ${combat.enemyMaxHp}</span>
            对方攻击力：${combat.enemyAtk}
            
            --------------------------------------------------
            ${logMsg || "战斗已经爆发，请迅速采取你的战术抉择！"}`;

            const choices = [
                { text: "⚔️ 普通攻击 (投掷百分之15的暴击率)", action: () => { runCombatTurn(false, 'attack'); } },
                { text: "🛡️ 战术格挡 (承受伤害减半，且造成固定8点盾牌反伤)", action: () => { runCombatTurn(false, 'block'); } }
            ];

            // 检查是否有药水可用
            if (player.inventory.includes("疗伤药水")) {
                choices.push({ text: "🧪 服用背包中的【疗伤药水】 (+50生命值)", action: () => { runCombatTurn(false, 'potion'); } });
            }

            render(screenText, choices, true);
        }

        // --- 最终 BOSS 区域：深渊神庙 ---
        function showAbyss() {
            const text = `🔥 【深渊神庙核心】
            两根擎天的黑岩巨柱合围出巨大的祭坛，中间盛放着此行的终极目标——黄金圣物。
            一头狂吠着的地狱三头魔犬在祭坛前撕咬，灼热的火焰从它的巨齿中溢出。
            
            ⚠️ 警告：一旦开启战斗，只有你或者巨兽一方死掉，决斗才会结束！`;

            const choices = [
                { text: "⚔️ 拔出武器，发起决战！", action: () => { startBossFight(); } }
            ];

            if (player.inventory.includes("神秘钥匙")) {
                choices.push({ text: "🔑 使用废墟中得到的【神秘钥匙】企图暗度陈仓", action: () => { bypassBoss(); } });
            }

            choices.push({ text: "🚶 还没准备好，先撤退", action: () => { playSound('click'); showCamp(); } });

            render(text, choices);
        }

        function startBossFight() {
            playSound('click');
            startBattle("地狱三头魔犬 (领主级BOSS)", 180, 22, 1000, 200, () => {
                showVictory();
            });
        }

        function bypassBoss() {
            playSound('heal');
            log("🔑 你将神秘钥匙插入了主殿一侧隐藏的小神龛中，地面的暗门悄然翻开。", '#81c784');
            const text = `🎉 【智取圣物：悄然逃脱】
            你通过狭窄的地下密道无声无息地绕过了狂怒咆哮常年盘踞的三头魔犬，将祭坛正中央沉睡的黄金圣徽揽入怀中，并在它发觉之前顺着密道顺利撤离！
            
            你没有耗费一丝体力，便安全带回了行会失落已久的国宝。`;
            const choices = [{ text: "🎮 重新开启新的一轮挑战", action: () => { playSound('click'); showNode('restart'); } }];
            render(text, choices);
        }

        function showVictory() {
            log("🎉 伴随着地狱魔犬最终不甘的轰然倒塌，你终于摘下了祭坛上的黄金圣物！", '#ffd54f');
            const text = `🏆 【史诗战役：胜利！】
            魔犬庞大的黑焰骸骨逐渐化为黑烟散去。
            你浑身浴血，却屹立不倒。你将这沉甸甸、散发着神圣辉光的黄金徽章捧在手心。
            这不仅完成了帝国的终极委托，你的威名也将彻底响彻这片迷失森林的大地！`;
            const choices = [{ text: "🎮 重新开启新的一轮挑战", action: () => { playSound('click'); showNode('restart'); } }];
            render(text, choices);
        }

        // --- 游戏失败 ---
        function gameOver() {
            playSound('hit');
            const text = `💀 【英勇战死】
            你在这次艰难的迷雾探索中走到了生命的终点。
            你的行囊和尚未完成的传说，一起长眠在了这片常年不见阳光的暗绿泥沼之下。`;
            const choices = [{ text: "🔄 重新开始冒险", action: () => { playSound('click'); showNode('restart'); } }];
            render(text, choices);
        }

        // --- UI 渲染驱动引擎 ---
        function render(htmlText, choicesArray, isCombat = false) {
            document.getElementById('game-screen').innerHTML = htmlText;
            const container = document.getElementById('choices');
            container.innerHTML = '';
            
            choicesArray.forEach(choice => {
                const btn = document.createElement('button');
                btn.innerHTML = choice.text;
                btn.onclick = choice.action;
                container.appendChild(btn);
            });
        }

        // 重启清零函数
        function showNode(actionKey) {
            if (actionKey === 'restart') {
                player = {
                    level: 1,
                    xp: 0,
                    xpNeeded: 100,
                    hp: 80,
                    maxHp: 80,
                    gold: 30,
                    baseAtk: 10,
                    atkBonus: 0,
                    baseDef: 2,
                    defBonus: 0,
                    inventory: [],
                    hasRested: false,
                    puzzleSolved: false
                };
                combat.active = false;
                log("系统重置，新一轮冒险开始！", '#81c784');
                showCamp();
            }
        }
    </script>
</body>
</html>
